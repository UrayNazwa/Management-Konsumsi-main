services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: management-konsumsi-backend
    ports:
      - "3001:3000"
    volumes:
      - ./backend/data:/app/data
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: management-konsumsi-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
