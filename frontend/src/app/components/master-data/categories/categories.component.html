<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold text-white">Master Kategori</h1>
      <p class="text-slate-400 mt-1">Kelola kategori barang konsumsi dan kebutuhan pokok</p>
    </div>
    <p-button 
      label="Tambah Kategori" 
      icon="pi pi-plus" 
      (click)="openAddDialog()" 
      styleClass="p-button-success"
    />
  </div>

  <!-- Card Container untuk Tabel -->
  <div class="bg-slate-900 rounded-2xl p-6 shadow-xl border border-slate-800">
    <p-table 
      [value]="categories" 
      responsiveLayout="scroll"
      styleClass="p-datatable-striped"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Nama Kategori</th>
          <th>Deskripsi</th>
          <th style="width: 12rem;">Aksi</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-category>
        <tr>
          <td class="font-medium text-slate-200">{{ category.name }}</td>
          <td class="text-slate-300">{{ category.description }}</td>
          <td>
            <div class="flex gap-2">
              <p-button 
                icon="pi pi-pencil" 
                class="p-button-text" 
                (click)="openEditDialog(category)"
              />
              <p-button 
                icon="pi pi-trash" 
                class="p-button-text p-button-danger" 
                (click)="deleteCategory(category)"
              />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-dialog 
  [header]="isEdit ? 'Edit Kategori' : 'Tambah Kategori Baru'" 
  [(visible)]="dialogVisible" 
  [modal]="true" 
  [draggable]="false" 
  [resizable]="false"
  styleClass="w-full max-w-md"
>
  <form [formGroup]="categoryForm" (ngSubmit)="saveCategory()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-300 mb-2">Nama Kategori</label>
      <input 
        pInputText 
        formControlName="name" 
        class="w-full"
        placeholder="Masukkan nama kategori"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-300 mb-2">Deskripsi</label>
      <textarea 
        pInputTextarea 
        formControlName="description" 
        rows="3"
        class="w-full"
        placeholder="Masukkan deskripsi kategori"
      ></textarea>
    </div>

    <div class="flex justify-end gap-2 pt-4 border-t border-slate-700">
      <p-button
        label="Batal"
        styleClass="p-button-text p-button-sm"
        (click)="closeDialog()"
        type="button"
      ></p-button>
      <p-button
        label="Simpan"
        styleClass="p-button-text p-button-sm"
        type="submit"
        [disabled]="!categoryForm.valid"
      ></p-button>
    </div>
  </form>
</p-dialog>

<p-toast />
